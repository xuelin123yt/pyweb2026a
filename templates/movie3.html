<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>教師查詢</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        .result-item { margin-bottom: 10px; padding: 10px; border-bottom: 1px solid #ddd; }
        .highlight { color: #0000ff; font-weight: bold; }
    </style>
</head>
<body>
    <h2>即將上映查詢</h2>
    
    <form method="POST">
        <label for="keyword">請輸入電影片名關鍵字：</label>
        <input type="text" id="keyword" name="keyword" value="人" required>
        <button type="submit">查詢</button>
    </form>

    <hr>

    {% if keyword %}
        <h3>查詢結果 (關鍵字: {{ keyword }}):</h3>
        {% if results %}
            {% for movie in results %}
                <div class="result-item">
                    <span class="highlight"><a href={{ movie.hyperlink }}>{{ movie.title }}</a></span> <br>
                    <img src=https://www.atmovies.com.tw{{ movie.picture }}></img></span> <br>
                    <strong>{{ movie.showDate }}上映</strong><br>
                    <strong>{{ movie.lastUpdate }}更新</strong>
                </div>
            {% endfor %}
        {% else %}
            <p>抱歉，找不到相關電影。</p>
        {% endif %}
    {% endif %}

    <br><a href="/">返回首頁</a>
</body>
</html>
